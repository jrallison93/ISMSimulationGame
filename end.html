<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Complete</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background-color: #f4f4f4;
      text-align: center;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
    }
    .results {
      text-align: center;
      margin-top: 1.2rem;
      padding: 1rem 1.1rem;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fbfbfb;
    }
    h1 {
      margin-bottom: 0.6rem;
    }
    p {
      margin-top: 0.4rem;
      margin-bottom: 1.4rem;
      color: #444;
    }
    .score {
      font-size: 1.05rem;
      margin: 1.1rem 0 0.2rem 0;
      font-weight: bold;
    }
    .commentary {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 0.9rem;
      line-height: 1.5;
    }
    #email-status {
      margin-top: 1rem;
      background: #f7f2ff;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      color: #333;
    }
    button {
      margin-top: 1.6rem;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      transition: background-color 0.25s ease, transform 0.12s ease;
    }
    button:hover {
      background-color: #0056b3;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
   button:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
      opacity: 0.75;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Congratulations!</h1>
    <p>You’ve completed all the scenarios.</p>

    <div class="results">
      <div class="score" id="budget-score">Budget: </div>
      <div class="commentary" id="budget-comment"></div>

      <div class="score" id="reputation-score">Reputation: </div>
      <div class="commentary" id="reputation-comment"></div>

      <div class="score" id="security-score">Security: </div>
      <div class="commentary" id="security-comment"></div>

      <div class="score" id="morale-score">Staff Morale: </div>
      <div class="commentary" id="morale-comment"></div>

      <div class="commentary" id="email-status"></div>
  </div>
    <button id="play-again-btn" onclick="window.location.href='index.html'">Play Again</button>
  </div>

  <script>
    localStorage.removeItem("resultsPending"); // Clear the flag since results are now being viewed
    function formatCurrency(value) {
      return "£" + value.toLocaleString('en-GB');
    }

    function getBudgetCommentary(budget) {
      if (budget >= 700000) return "Excellent budget — strong financial backing.";
      if (budget >= 550000) return "Good budget — sufficient resources available.";
      if (budget >= 400000) return "Moderate budget — be cautious with spending.";
      if (budget >= 250000) return "Low budget — consider reallocating resources.";
      if (budget > 0) return "Critical budget — immediate action needed!";
      return "No budget — game over!";
    }

    function getGeneralCommentary(score) {
      if (score >= 150) return "Excellent performance in this area.";
      if (score >= 120) return "Above average, keep it up.";
      if (score >= 85) return "Average performance.";
      if (score >= 35) return "Needs improvement.";
      if (score >= 10) return "Critical condition.";
      return "Failing — take immediate action!";
    }

    const finalScores = JSON.parse(localStorage.getItem("finalScores")) || {
      budget: 0,
      reputation: 0,
      security: 0,
      morale: 0
    };

    document.getElementById("budget-score").textContent = "Budget: " + formatCurrency(finalScores.budget);
    document.getElementById("budget-comment").textContent = getBudgetCommentary(finalScores.budget);

    document.getElementById("reputation-score").textContent = "Reputation: " + finalScores.reputation;
    document.getElementById("reputation-comment").textContent = getGeneralCommentary(finalScores.reputation);

    document.getElementById("security-score").textContent = "Security: " + finalScores.security;
    document.getElementById("security-comment").textContent = getGeneralCommentary(finalScores.security);

    document.getElementById("morale-score").textContent = "Staff Morale: " + finalScores.morale;
    document.getElementById("morale-comment").textContent = getGeneralCommentary(finalScores.morale);


// Decision log auto-email 
const DECISION_LOG_EMAIL_ENDPOINT = "https://script.google.com/macros/s/AKfycbweyyfcAmjnxd7g9YsTmhRA-HPezmyG0dIhkZEIeItRcsgUSsuk6chgcVuzPWBygIzW/exec";
const DECISION_LOG_SECRET = "CyberSecSim!log#2026";

function generateRunId() {
  return "run_" + Date.now() + "_" + Math.random().toString(16).slice(2);
}

function sendDecisionLogPdfOnCompletion() {
  const statusEl = document.getElementById("email-status");
  const playAgainBtn = document.getElementById("play-again-btn");

  if (playAgainBtn) playAgainBtn.disabled = true;

  const alreadySentAt = localStorage.getItem("decisionLogSentAt");
  if (alreadySentAt) {
    if (statusEl) statusEl.textContent = "Decision log already submitted.";
    if (playAgainBtn) playAgainBtn.disabled = false;
    return;
  }

  const decisionLog = JSON.parse(localStorage.getItem("decisionLog") || "[]");

  if (!decisionLog.length) {
    if (statusEl) statusEl.textContent = "No decision log found to submit.";
    if (playAgainBtn) playAgainBtn.disabled = false;
    return;
  }

  const runId = localStorage.getItem("decisionLogRunId") || generateRunId();
  localStorage.setItem("decisionLogRunId", runId);

  const payload = {
    secret: DECISION_LOG_SECRET,
    sent_at: new Date().toISOString(),
    run_id: runId,
    finalScores: finalScores,
    decisionLog: decisionLog
  };

  if (statusEl) statusEl.textContent = "Submitting decision log...";

  fetch(DECISION_LOG_EMAIL_ENDPOINT, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    localStorage.setItem("decisionLogSentAt", new Date().toISOString());
    if (statusEl) statusEl.textContent = "Decision log submitted.";
    if (playAgainBtn) playAgainBtn.disabled = false;
  })
  .catch(() => {
    if (statusEl) statusEl.textContent = "Could not submit decision log. Please check connection and refresh.";
    if (playAgainBtn) playAgainBtn.disabled = false;
  });
}
sendDecisionLogPdfOnCompletion();
  </script>
</body>
</html>
