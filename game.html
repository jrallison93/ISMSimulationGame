<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISM Scenario Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background-image: linear-gradient(rgba(240, 240, 240, 0.55), rgba(240, 240, 240, 0.55)),
                    url('https://raw.githubusercontent.com/jrallison93/ISMSimulationGame/135b5d0ed2766f0e8618834fa2bb1d6972ca7acb/Background-Homepage.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
     
    }
    .container {
      max-width: 700px; /* a bit wider helps long scenarios */
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
    }
    .progress-wrap {
      margin-bottom: 1.2rem;
    }
    .progress-label {
      font-size: 0.95rem;
      font-weight: bold;
      color: #444;
      margin-bottom: 0.4rem;
    }
    .progress-bar {
      height: 12px;
      background: #e9ecef;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #b9a3e3;
      border-radius: 999px;
      transition: width 0.3s ease;
    }
    .scenario {
      margin-bottom: 1.5rem;
      font-size: 1.05rem;
      line-height: 1.7;
      color: #111;
    }
    #scenario-text { /* long scenario text to paragraph style */
      max-width: 65ch;      
      margin: 0 auto 1.5rem auto; 
      text-align: left;   
      line-height: 1.75;
      white-space: pre-line;
    }
    
    .choices button {
      display: block;
      width: 100%;
      margin-bottom: 1rem;
      padding: 1.15rem 1.1rem;
      border: 1px solid #e6eefc; 
      border-radius: 10px;
      border-left: 6px solid #007bff;
      background:  #f8fbff;
      color: #111;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: background-color 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .choices button:hover {
      background: #eef6ff;
      transform: translateY(-1px);
      border-color: rgba(0,123,255,0.35);
      box-shadow: 0 10px 18px rgba(0,0,0,0.08);
    }

    .choices button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .choice-title {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.35rem;
    }

    .choice-details {
      display: block;
      font-size: 0.98rem;
      line-height: 1.5;
      color: #333;
      margin-bottom: 0.35rem;
    }

    .choice-cost {
      display: block;
      font-size: 0.92rem;
      font-style: italic;
      color: #666;
      margin-top: 0.15rem;
    }
    
    .scores {
      margin-top: 1.2rem;
      margin-bottom: 1.5rem;
      padding-top: 0.8rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
    }

    .score-card {
      background: #f8fbff;
      border: 1px solid #e6eefc;
      border-radius: 10px;
      padding: 0.9rem 0.8rem;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .score-label {
      font-size: 0.9rem;
      font-weight: bold;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .score-value {
      font-size: 1.15rem;
      font-weight: bold;
      color: #111;
      margin-bottom: 0.25rem;
    }

    .scenario-image-box {
      width: 100%;
      margin: 1.2rem 0 1.5rem 0;
      display: none;
      justify-content: center;
      background: transparent;
      border: none;
      padding: 0;
    }

    .scenario-image-box img {
      max-width: 640px;
      max-height: 300px;
      width: auto;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    .score-change {
      display: block;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .score-change.positive {
      color: green;
    }

    .score-change.negative {
      color: red;
    }

    .outcome {
      margin-top: 1rem;
      line-height: 1.65;
      font-style: normal;
      color: #333;
    }

    .outcome:not(:empty) {
      background: #f7f2ff;              
      border-left: 4px solid #6f42c1;
      padding: 0.9rem 1rem;
      border-radius: 10px;
      margin-top: 1.2rem;
      margin-bottom: 0.8rem;
    }

    .outcome strong {
      color: #111;
    }

    #next-btn, #restart-btn, #home-btn, #log-btn, #about-btn {
      width: 220px;
      padding: 0.85rem 1rem;
      border: none;
      color: white;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      white-space: nowrap;
    }

    #next-btn {
      background: #28a745;
      margin-top: 1.2rem;
      margin-bottom: 1.2rem;
    }

    #next-btn:hover { 
      background: #218838; 
    }

    #next-btn.final-btn {
      margin-top: 1.2rem;
      margin-bottom: 1.2rem;
    }

    #restart-btn {
      background: #dc3545;
    }

    #restart-btn:hover { 
      background: #c82333; 
    }

    #log-btn {
      background: #007bff;
      margin-top: 1.2rem;
      margin-bottom: 1.2rem;
    }

    #log-btn:hover {
      background: #0056b3;
    }

    #about-btn {
      background: #17a2b8;
      display: inline-block;
      margin-top: 1.2rem;
      margin-bottom: 1.2rem;
    }

    #about-btn:hover {
      background: #117a8b;
    }

    #home-btn {
      background: #6c757d;
      display: inline-block;
      margin-top: 1.2rem;
      margin-bottom: 1.2rem;
    }

    #home-btn:hover {
      background: #5a6268;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
    }

    .button-row.game-over-buttons {
      gap: 0.8rem;
    }

    .button-row.game-over-buttons #restart-btn,
    .button-row.game-over-buttons #log-btn {
      width: 240px;
      max-width: 240px;
      flex: 0 0 240px;
    }

    .primary-buttons {
      margin-top: 1rem;
    }

    .secondary-buttons {
      margin-top: 0.8rem;
    }

    .game-over-box {
      max-width: 650px;
      margin: 0 auto;
      background: #fff4f4;
      border: 1px solid #f1c0c0;
      border-left: 6px solid #dc3545;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      text-align: left;
    }

    .game-over-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #b02a37;
      margin-bottom: 0.6rem;
    }

    .game-over-message {
      line-height: 1.7;
      color: #333;
    }
    /* Mobile: stack the main buttons */
    @media (max-width: 600px) {
    .button-row {
      flex-direction: column;
      align-items: center;
    }
    #next-btn, #restart-btn, #home-btn, #log-btn, #about-btn {
      width: 100%;
      max-width: 320px;
      margin: 0.8rem auto;
    }
    .scores {
      grid-template-columns: repeat(2, 1fr);
    }
    .score-card {
      padding: 0.8rem 0.6rem;
    }
  }
  </style>
</head>
<body>
  <div class="container">

  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">Progress:</div>
    <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
   </div>
  </div>

  <!-- move metrics to the top -->
  <div class="scores">
    <div class="score-card">
    <div class="score-label">Budget</div>
    <div class="score-value" id="budget">£500,000</div>
    <div class="score-change" id="budget-change"></div>
  </div>

  <div class="score-card">
    <div class="score-label">Reputation</div>
    <div class="score-value" id="reputation">100</div>
    <div class="score-change" id="reputation-change"></div>
  </div>

  <div class="score-card">
    <div class="score-label">Security</div>
    <div class="score-value" id="security">100</div>
    <div class="score-change" id="security-change"></div>
  </div>

  <div class="score-card">
    <div class="score-label">Staff Morale</div>
    <div class="score-value" id="morale">100</div>
    <div class="score-change" id="morale-change"></div>
  </div>
</div>

<!-- add scenario image box -->
  <div class="scenario-image-box" id="scenario-image-box"></div>
  
    <div class="scenario" id="scenario-text"></div>
    <div class="choices" id="choices"></div>
    <div class="outcome" id="outcome-text"></div>

 <div class="button-row primary-buttons">
  <button id="next-btn" onclick="goToNextScenario()">Next Scenario</button>
  <button id="restart-btn" onclick="restartGame()">Restart Game</button>
  <button id="log-btn" onclick="goToLog()">View Decision Log</button>
 </div>

 <div class="button-row secondary-buttons">
  <button id="home-btn" onclick="goHome()">Return to Homepage</button>
  <button id="about-btn" onclick="goToAbout()">About the Game</button>
 </div>
</div>
  
  <!-- Load scenarios from external file -->
  <script src="scenario-bank.js"></script>

  <script>
    
    let budget, reputation, security, morale;
    let currentScenarioIndex, scenarioOrder, completedScenarios;

    function loadGameState() {
      const saved = JSON.parse(localStorage.getItem("ismGameState"));
        if (!saved) {
          resetGameState();
          return;
        }

        budget = saved.budget ?? 500000;
        reputation = saved.reputation ?? 100;
        security = saved.security ?? 100;
        morale = saved.morale ?? 100;

        const allIds = [...Array(scenarios.length).keys()];

        const savedOrder = Array.isArray(saved.scenarioOrder)
          ? saved.scenarioOrder.filter((id) => allIds.includes(id))
          : [];

        const uniqueSavedOrder = [...new Set(savedOrder)];

        const missingIds = allIds.filter((id) => !uniqueSavedOrder.includes(id));

        scenarioOrder = uniqueSavedOrder
          .concat(missingIds)
          .slice(0, scenariosPerRun);

        completedScenarios = Array.isArray(saved.completedScenarios)
          ? saved.completedScenarios.filter((id) => scenarioOrder.includes(id))
          : [];

        const nextIncompleteIndex = scenarioOrder.findIndex(
          (id) => !completedScenarios.includes(id)
        );

        if (nextIncompleteIndex === -1) {
          currentScenarioIndex = scenarioOrder.length;
        } else {
          currentScenarioIndex = nextIncompleteIndex;
        }

        saveGameState();
    }

    function saveGameState() {
      localStorage.setItem("ismGameState", JSON.stringify({
        budget, reputation, security, morale, currentScenarioIndex, scenarioOrder, completedScenarios
      }));
    }

    function resetGameState() {
      budget = 500000;
      reputation = 100;
      security = 100;
      morale = 100;
      currentScenarioIndex = 0;
      scenarioOrder = shuffle([...Array(scenarios.length).keys()]).slice(0, scenariosPerRun);
      completedScenarios = [];
    }

    function initialiseGame() {
      loadGameState();
      document.getElementById("restart-btn").style.display = "none";
      goToNextScenario(true);
      updateScoreDisplay();
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function updateScores(effects) {
      const clamp = (val, max = Infinity) => Math.min(Math.max(0, val), max);

      const updateDisplay = (id, change, isCurrency = false) => {
        const element = document.getElementById(id);
        if (change !== 0) {
          element.textContent = ` (${change > 0 ? '+' : ''}${isCurrency ? '£' + Math.abs(change).toLocaleString() : change})`;
        } else {
          element.textContent = '';
        }
        element.className = 'score-change';
        if (change > 0) element.classList.add('positive');
        else if (change < 0) element.classList.add('negative');
      };

      updateDisplay("budget-change", effects.budget, true);
      updateDisplay("reputation-change", effects.reputation);
      updateDisplay("security-change", effects.security);
      updateDisplay("morale-change", effects.morale);

      budget = clamp(budget + (effects.budget || 0));
      reputation = clamp(reputation + (effects.reputation || 0), 200);
      security = clamp(security + (effects.security || 0), 200);
      morale = clamp(morale + (effects.morale || 0), 200);

      updateScoreDisplay();
      saveGameState();

      if (budget <= 0) {
        endGame("You have exceeded the available budget and can no longer continue in the role. Restart the game to try again.");
      }
    }

    function updateScoreDisplay() {
      document.getElementById("budget").textContent = "£" + budget.toLocaleString();
      document.getElementById("reputation").textContent = reputation;
      document.getElementById("security").textContent = security;
      document.getElementById("morale").textContent = morale;
    }

    function updateProgress() {
      const total = scenarioOrder.length;
      const done = completedScenarios.length;

      document.getElementById("progress-label").textContent = `Progress: ${done} / ${total}`;
      document.getElementById("progress-fill").style.width = `${total ? (done / total) * 100 : 0}%`;
    }

    function showScenario(index) {
      if (budget <= 0){
         endGame("You have exceeded the available budget and can no longer continue in the role. Restart the game to try again.");
         return;
      } 

      if (index >= scenarioOrder.length) {

        // If there is still an incomplete scenario, go there instead of ending
        const nextIncompleteIndex = scenarioOrder.findIndex((id) => !completedScenarios.includes(id));
        if (nextIncompleteIndex !== -1) {
        currentScenarioIndex = nextIncompleteIndex;
        saveGameState();
        showScenario(currentScenarioIndex);
        return;
        } 

        // Only end when everything is completed
        localStorage.setItem("finalScores", JSON.stringify({ budget, reputation, security, morale }));
        window.location.href = "end.html";
        return;
      }
      const scenarioIdx = scenarioOrder[index];

      if (completedScenarios.includes(scenarioIdx)) {
        goToNextScenario();
        return;
      }

      const scenario = scenarios[scenarioIdx];
      const imageBox = document.getElementById("scenario-image-box"); // get the image box element

      document.getElementById("outcome-text").textContent = "";
      document.getElementById("next-btn").style.display = "none";
      document.getElementById("log-btn").style.display = "none";
      document.querySelector(".primary-buttons").classList.remove("game-over-buttons");
      document.getElementById("next-btn").textContent = "Next Scenario";
      document.getElementById("home-btn").style.display = "inline-block";

      // Update scenario text and image
      if (scenario.image) {
        imageBox.style.display = "flex";
        imageBox.innerHTML = `<img src="${scenario.image}" alt="Scenario image">`; 
      } else {
        imageBox.style.display = "none";
        imageBox.innerHTML = "";
      }
      document.getElementById("scenario-text").textContent = scenario.text;

      // Update progress bar
      updateProgress();

      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";

      scenario.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.innerHTML = `
          <span class="choice-title">${choice.title}</span>
          <span class="choice-details">${choice.details}</span>
          <span class="choice-cost">Estimated cost: ${choice.estimatedCost}</span>
        `;
        button.onclick = () => {
          const currentState = { budget, reputation, security, morale };

          const effects = choice.getEffects(currentState);
          const results = choice.getResults(currentState);
          const outcomeText =
          `<strong>Security:</strong> ${results.security}<br><br>` +
          `<strong>Reputation:</strong> ${results.reputation}<br><br>` +
          `<strong>Budget:</strong> ${results.budget}<br><br>` +
          `<strong>Staff Morale:</strong> ${results.morale}`;
          const willBudgetExhaust = budget + (effects.budget || 0) <= 0;

          const loggedOutcomeText = willBudgetExhaust
              ? `${outcomeText}<div class="budget-failure-note">GAME OVER: Out of Budget</div>`
              : outcomeText;

          updateScores(effects);

          // Log the decision
          const decisionLog = JSON.parse(localStorage.getItem('decisionLog') || '[]');
            decisionLog.push({
            scenario: scenario.text,
            choice: choice.title,
            outcome: loggedOutcomeText,
            effects: effects,
            timestamp: new Date().toISOString()
          });
          localStorage.setItem('decisionLog', JSON.stringify(decisionLog));

           if (budget <= 0) {
            sendDecisionLogOnBudgetFailure();
            return;
          }

          if (!completedScenarios.includes(scenarioIdx)) {
            completedScenarios.push(scenarioIdx);
            saveGameState();
            updateProgress();
          }
          // Save final results as soon as the last scenario is answered
          if (completedScenarios.length >= scenarioOrder.length) {
            localStorage.setItem("finalScores", JSON.stringify({ budget, reputation, security, morale }));
            localStorage.setItem("resultsPending", "1"); // results exist, but user hasn’t viewed them yet
          }

          choicesDiv.innerHTML = "";
          // change the button text of the final choice to "Next Scenario" or "View Results" if it was the last one
          document.getElementById("outcome-text").innerHTML = `<strong>You chose:</strong><br>${choice.title}<br><br>${outcomeText}`;

          const nextBtn = document.getElementById("next-btn");
          const homeBtn = document.getElementById("home-btn");
          const logBtn = document.getElementById("log-btn");

          if (completedScenarios.length >= scenarioOrder.length) {
          nextBtn.textContent = "View Results";
          homeBtn.style.display = "none";
          nextBtn.classList.add("final-btn");
          } else {
          nextBtn.textContent = "Next Scenario";
          nextBtn.classList.remove("final-btn");
      }

          if (completedScenarios.length >= scenarioOrder.length) {
          nextBtn.style.display = "block";
          } else {
          nextBtn.style.display = "inline-block";
          }
          logBtn.style.display = "inline-block";
         
        };
        choicesDiv.appendChild(button);
      });
    }

    function goToNextScenario(isInitial = false) {
      ["budget", "reputation", "security", "morale"].forEach(id => {
        const change = document.getElementById(`${id}-change`);
        change.textContent = "";
        change.className = "score-change";
      });

      if (!isInitial) currentScenarioIndex++;

      while (currentScenarioIndex < scenarioOrder.length && completedScenarios.includes(scenarioOrder[currentScenarioIndex])) {
        currentScenarioIndex++;
      }

      saveGameState();
      showScenario(currentScenarioIndex);
    }

    function endGame(message) {
     const imageBox = document.getElementById("scenario-image-box");
      imageBox.style.display = "none";
      imageBox.innerHTML = "";
      document.getElementById("scenario-text").innerHTML = `
      <div class="game-over-box">
      <div class="game-over-title">Out of Budget</div>
      <div class="game-over-message">${message}</div>
      </div>
    `;

      document.getElementById("choices").innerHTML = "";
      document.getElementById("outcome-text").textContent = "";
      document.getElementById("next-btn").style.display = "none";

      const restartBtn = document.getElementById("restart-btn");
      const logBtn = document.getElementById("log-btn");
      const primaryButtons = document.querySelector(".primary-buttons");

      restartBtn.style.display = "inline-block";
      logBtn.style.display = "inline-block";
      primaryButtons.classList.add("game-over-buttons");

      document.getElementById("home-btn").style.display = "none";
      document.getElementById("about-btn").style.display = "none";
    }

    function restartGame() {
      localStorage.removeItem("ismGameState");
      localStorage.removeItem("resultsPending");
      localStorage.removeItem("finalScores");
      localStorage.removeItem("introSeen");
      localStorage.removeItem("decisionLog");
      localStorage.removeItem("decisionLogSentAt");
      localStorage.removeItem("decisionLogRunId");
      window.location.href = "index.html";
    }

    function goHome() {
      window.location.href = "index.html";
    }

    function goToLog() {
      window.location.href = "log.html";
    }

    function goToAbout() {
      window.location.href = "about.html";
    }

    const DECISION_LOG_EMAIL_ENDPOINT = "https://script.google.com/macros/s/AKfycbweyyfcAmjnxd7g9YsTmhRA-HPezmyG0dIhkZEIeItRcsgUSsuk6chgcVuzPWBygIzW/exec";
    const DECISION_LOG_SECRET = "CyberSecSim!log#2026";

    function generateRunId() {
      return "run_" + Date.now() + "_" + Math.random().toString(16).slice(2);
    }

    function sendDecisionLogOnBudgetFailure() {
    const alreadySentAt = localStorage.getItem("decisionLogSentAt");
      if (alreadySentAt) return;

    const decisionLog = JSON.parse(localStorage.getItem("decisionLog") || "[]");
      if (!decisionLog.length) return;

    const runId = localStorage.getItem("decisionLogRunId") || generateRunId();
      localStorage.setItem("decisionLogRunId", runId);

    const payload = {
      secret: DECISION_LOG_SECRET,
      sent_at: new Date().toISOString(),
      run_id: runId,
      failure_type: "budget_exhausted",
      finalScores: { budget, reputation, security, morale },
      decisionLog: decisionLog
    };

    fetch(DECISION_LOG_EMAIL_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    })
    .then(() => {
      localStorage.setItem("decisionLogSentAt", new Date().toISOString());
    })
    .catch(() => {
      console.log("Could not submit decision log on budget failure.");
    });
  }

    initialiseGame();
  </script>
</body>
</html>
