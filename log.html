<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ISM Game Decision Log</title>

  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background-color: #f4f4f4;
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.6rem;
    }

    .log-entry {
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
    }

    .timestamp {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .scenario {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .choice {
      margin-bottom: 0.5rem;
    }

    .outcome {
      font-style: italic;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .effects {
      background: #f8fbff;
      border: 1px solid #e6eefc;
      border-left: 4px solid #b9a3e3;
      border-radius: 8px;
      padding: 0.7rem 0.8rem;
      font-family: monospace;
      white-space: pre-wrap;
    }

    #home-btn {
      background: #6c757d;
      border: none;
      color: white;
      padding: 0.85rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: inline-block;
      width: 46%;
      margin: 1rem 0 0 2%;
      vertical-align: top;
      transition: background-color 0.25s ease, transform 0.12s ease;
    }

    #home-btn:hover {
      background: #5a6268;
      transform: translateY(-1px);
    }

    #home-btn:active {
      transform: translateY(0);
    }

    #download-btn {
     background: #28a745;
     border: none;
     color: white;
     padding: 0.85rem 1.2rem;
     border-radius: 8px;
     cursor: pointer;
     font-size: 1rem;
     display: inline-block;
     width: 46%;
     margin: 1rem 2% 0 0;
     vertical-align: top;
     transition: background-color 0.25s ease, transform 0.12s ease;
    }

    #download-btn:hover {
      background: #218838;
      transform: translateY(-1px);
    }

    #download-btn:active {
      transform: translateY(0);
   }

    p.empty {
      text-align: center;
      color: #888;
      margin-top: 3rem;
    }
    /* Mobile: stack buttons */
    @media (max-width: 600px) {
    #download-btn,
    #home-btn {
      display: block;
      width: 100%;
      max-width: 220px;
      margin: 0.8rem auto;
      }
    }
  </style>
</head>

<body>
  <h1>Decision Log</h1>

  <div id="log-container"></div>

  <button id="download-btn" onclick="downloadPDF()">Download PDF</button>
  <button id="home-btn" onclick="goHome()">Return to Homepage</button>

  <script>
    function formatEffects(effects) {
      return Object.entries(effects).map(([key, val]) => {
        const sign = val >= 0 ? '+' : '';
        return `${key}: ${sign}${val}`;
      }).join('\n');
    }

    function goHome() {
      window.location.href = "index.html";
    }

    function renderLog() {
      const logContainer = document.getElementById('log-container');
      const decisionLog = JSON.parse(localStorage.getItem('decisionLog') || '[]');

      if (!decisionLog.length) {
        logContainer.innerHTML = '<p class="empty">No decisions logged yet.</p>';
        return;
      }

      logContainer.innerHTML = '';

      decisionLog.forEach((entry) => {
        const div = document.createElement('div');
        div.className = 'log-entry';

        div.innerHTML = `
          <div class="timestamp">🕒 ${new Date(entry.timestamp).toLocaleString()}</div>
          <div class="scenario">Scenario: ${entry.scenario}</div>
          <div class="choice">Your Choice: ${entry.choice}</div>
          <div class="outcome">Outcome: ${entry.outcome}</div>
          <pre class="effects">${formatEffects(entry.effects)}</pre>
        `;

        logContainer.appendChild(div);
      });
    }

    async function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const decisionLog = JSON.parse(localStorage.getItem('decisionLog') || '[]');

      if (!decisionLog.length) {
        alert("No decisions to export.");
        return;
      }

      const doc = new jsPDF();
      let y = 20;

      doc.setFontSize(16);
      doc.text("ISM Game Decision Log", 20, y);
      y += 10;

      doc.setFontSize(10);

      decisionLog.forEach((entry, index) => {
        const timestamp = new Date(entry.timestamp).toLocaleString();

        const block = [
          `Decision ${index + 1}`,
          `Time: ${timestamp}`,
          `Scenario: ${entry.scenario}`,
          `Choice: ${entry.choice}`,
          `Outcome: ${entry.outcome}`,
          `Effects: ${formatEffects(entry.effects)}`,
          " "
        ];

        block.forEach(line => {
          const split = doc.splitTextToSize(line, 170);

          split.forEach(l => {
            if (y > 280) {
              doc.addPage();
              y = 20;
            }
            doc.text(l, 20, y);
            y += 6;
          });
        });

        y += 4;
      });

      doc.save("ISM_Decision_Log.pdf");
    }

    renderLog();
  </script>
</body>
</html>
